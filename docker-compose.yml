services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "1355:1355"
      - "1356:1356"
    environment:
      - PORTLESS_PORT=1355
      - PORTLESS_HTTPS_ENABLED=false
      - PORTLESS_STATE_DIR=/home/portless/.portless
      - DOTNET_ENVIRONMENT=Production
    volumes:
      - portless-state:/home/portless/.portless
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1355/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Example backend for testing (activate with: docker compose --profile test up)
  test-api:
    image: nginx:alpine
    profiles:
      - test
    ports:
      - "8080:80"

volumes:
  portless-state:
