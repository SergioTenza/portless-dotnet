name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Portless.slnx

      - name: Build
        run: dotnet build Portless.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Portless.slnx
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=ObsoleteAttribute,GeneratedCodeAttribute,CompilerGeneratedAttribute

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/**
          retention-days: 7

  pack:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Portless.slnx

      - name: Build
        run: dotnet build Portless.slnx --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack Portless.Cli/Portless.Cli.csproj
          --configuration Release
          --no-build
          --output ./artifacts
          -p:PackageVersion=${{ github.ref_name == 'main' && '1.0.0' || '0.0.0-dev' }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
          retention-days: 7
