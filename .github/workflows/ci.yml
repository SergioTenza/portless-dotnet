name: CI

on:
  push:
    branches: [main, development, feature/*]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build Portless.slnx --configuration Release

      - name: Run unit tests
        run: >
          dotnet test Portless.Tests/Portless.Tests.csproj
          --configuration Release
          --filter "FullyQualifiedName!~YarpProxyIntegrationTests&FullyQualifiedName!~SignalRIntegrationTests&FullyQualifiedName!~Http2IntegrationTests"

      - name: Run integration tests
        run: dotnet test Portless.IntegrationTests/Portless.IntegrationTests.csproj --configuration Release
