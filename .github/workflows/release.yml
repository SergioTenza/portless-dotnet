name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test Portless.slnx --configuration Release

      - name: Publish Native AOT executable
        run: |
          dotnet publish Portless.Cli/Portless.Cli.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishAot=true \
            -o publish/${{ matrix.runtime }}

      - name: Upload to GitHub Release (win-x64)
        if: matrix.runtime == 'win-x64'
        uses: softprops/action-gh-release@v2
        with:
          files: publish/${{ matrix.runtime }}/portless.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release (unix)
        if: matrix.runtime != 'win-x64'
        uses: softprops/action-gh-release@v2
        with:
          files: publish/${{ matrix.runtime }}/portless
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
