name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore Portless.slnx

      - name: Build
        run: dotnet build Portless.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Portless.slnx
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Pack
        run: >
          dotnet pack Portless.Cli/Portless.Cli.csproj
          --configuration Release
          --no-build
          --output ./artifacts
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            LOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          {
            echo "CHANGES<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, uploading assets..."
            gh release upload ${{ github.ref_name }} ./artifacts/*.nupkg --clobber
          else
            gh release create ${{ github.ref_name }} \
              ./artifacts/*.nupkg \
              --title "Release ${{ github.ref_name }}" \
              --notes "## Changes
          ${{ steps.changelog.outputs.CHANGES }}

          ## Installation
          \`\`\`bash
          dotnet tool install --global Portless.NET.Tool --version ${{ steps.version.outputs.VERSION }}
          \`\`\`"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/**
          retention-days: 7

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
          retention-days: 30
